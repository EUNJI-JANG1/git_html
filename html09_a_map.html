<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한 이미지에 다른 페이지 링크 걸기</title>
</head>
<body>
    <h2>이미지의 일부를 이용한 링크 걸기</h2>
    <img src="../img/jeju.png" usemap="#jejuMap">

    <pre>
        map태그 : 특정이미지의 특정부분에 링크를 걸기 위한 기능 구현
        map 태그는 페이지의 마지막에 기술(권장)

        area태그 : map 태그 내 링크 수 만큼 표기
            shape 속성 : rect(사각), circle(원), poly(다각)
            coords 속성 : 좌표 표현
    </pre>

    <map id="jejuMap">
        <!-- 사각형 범위: 왼쪽상단(x1,y1), 오른쪽하단(x2,y2)-->
        <area shape="rect" coords="185,130,270,205" href="https://www.jejuair.net/ko/main/base/index.do" target="_blank" title="제주항공으로">
        <!-- 원형 범위: 중심(x,y), 반지름(r)-->
        <area shape="circle" coords="460, 290, 60" href="https://www.jeju.go.kr/hallasan/index.htm" target="_blank" title="한라산으로" >
        <!-- 다각형 범위: 시계(반대)방향 순서대로 꼭지점1(x1,y1), 꼭지점(x2,y2), 꼭지점(x3,y3) ... -->
         <area shape="poly" coords="90,200,190,270,140,320,70,320,40,250" href="https://naver.me/5LQBKMOI" target="_blank" title="협재해수욕장으로">
    </map>
</body>
</html>
