<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>목록태그</title>
</head>
<body>
    <h2>목록태그없이 리스트 만들기</h2>
    1. html<br>
    2. CSS<br>
    3. javascript<br/>

    <h2>순서가 있는 목록태그</h2>
    <ol type="i" start="2">
        <li>해바라기</li>
        <li>민들레</li>
        <li>코스모스</li>
        <li>히야신스</li>
    </ol>

    <h2>순서가 없는 목록태그</h2>
    <ul type="circle">
        <li>파인애플</li>
        <li>망고</li>
        <li>사과</li>
    </ul>

    <h2>설명 목록태그</h2>
    <dl>
        <dt>HTML이란</dt>
        <dd>
            Hyper Text Markup Language<br>
            Web Fronted Programing
        </dd>
    </dl>
</body>
</html>
