<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>video태그</h2>
    <pre>
        autoplay : 영상 자동실행. 웹 브라우저의 경우 autoplay 기능을 막아놨음. muted 속성 부여해야 사용 가능
        muted : 음소거
        width, height : 폭, 너비 지정
        loop : 재생횟수
        preload : 동영상 로딩 방식 지정(스트리밍 방식이나 전체 영상 다운 후 재생 등 auto, metadata, none)
        poster : 재생 전 표시할 이미지(jpg,jpeg,gif) 지정
    </pre>
    <video src="./../audio_movie/Wildlife.mp4" controls width="400" poster="../img/flower1.jpeg"></video>
</body>
</html>
