<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table 합치기</title>
</head>
<body>
    <h2>4행 5열 테이블 만들기</h2>
    <pre>
        colspan속성: 칸(열) 병합
        rowspan속성: 줄(행) 병합
    </pre>

    <table border="1" style="text-align: center;">
        <tr>
            <td>AAAAA</td>
            <td>BBBBB</td>
            <td colspan="2">CCCCC</td>
            <td rowspan="3">DDDDD</td>
        </tr>
        <tr>
            <td colspan="2">EEEEE</td>
            <td rowspan="3">FFFFF</td>
            <td>GGGGG</td>
        </tr>
        <tr>
            <td>HHHHH</td>
            <td>IIIII</td>
            <td>JJJJJ</td>
        </tr>
        <tr>
            <td>KKKKK</td>
            <td>LLLLL</td>
            <td>MMMMM</td>
            <td>NNNNN</td>
        </tr>
    </table>
</body>
</html>
